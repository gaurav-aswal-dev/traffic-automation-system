<!DOCTYPE html>
<html>
<head>
    <title>Smart Traffic System</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <div class="header">
        <h1>🚦 Smart Traffic Management</h1>
        <div class="stats">
            Cars: <span id="cars">0</span> | 
            Ambulances: <span id="ambulances">0</span> | 
            Status: <span id="simStatus">Running</span>
        </div>
    </div>

    <div class="main-container">
        <div class="map-container">
            <canvas id="canvas"></canvas>
        </div>

        <div class="sidebar">
            <div class="card">
                <h3>🎮 Simulation Controls</h3>
                <div class="control-group">
                    <button id="startBtn"> Pause</button>
                    <button id="stepBtn"> Step</button>
                </div>
                <label>Speed: <input type="range" id="speedSlider" min="50" max="2000" value="250"><span id="speedValue">250ms</span></label>
            </div>

            <div class="card">
                <h3>🚥 Traffic Light</h3>
                <div class="light-status">Current: <strong id="currentGreen">NORTH</strong></div>
                <button id="cycleLightBtn">Cycle</button>
            </div>

            <div class="card">
                <h3> Lane Occupancy</h3>
                <div class="lanes">
                    <span>N: <span id="northCount">0</span></span>
                    <span>S: <span id="southCount">0</span></span>
                    <span>E: <span id="eastCount">0</span></span>
                    <span>W: <span id="westCount">0</span></span>
                </div>
            </div>

            <div class="card">
                <h3> Add Vehicle</h3>
                <div class="control-group">
                    <select id="type">
                        <option value="car">Car</option>
                        <option value="ambulance">Ambulance</option>
                    </select>
                    <select id="lane">
                        <option value="north">North</option>
                        <option value="south"> South</option>
                        <option value="east"> East</option>
                        <option value="west"> West</option>
                    </select>
                </div>
                <button onclick="addVehicle()"> Dispatch</button>
                <div id="feedback" class="feedback"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
